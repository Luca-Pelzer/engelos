# GoReleaser configuration for engelOS.
# See: https://goreleaser.com
#
# Phase 0: minimal Linux-only build. Phase 1A adds Docker. Phase 1D adds
# macOS/Windows binaries. Phase 2 adds code-signed Native-GUI (.dmg/.msi).

version: 2

project_name: engelos

before:
  hooks:
    - go mod tidy

builds:
  - id: engelos
    main: ./cmd/engelos
    binary: engelos
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: true
  prerelease: auto
  header: |
    ## engelOS {{ .Tag }}

    This is a Phase {{ .Env.PHASE }} release. See the
    [Master Vision Plan](docs/MASTER-VISION.md) for the full roadmap.
  footer: |
    **License**: AGPL-3.0 (core) · Apache-2.0 (SDK) · Proprietary (Cloud)

    **Documentation**: <https://engelos.org>
    **Issues**: <https://github.com/engelos-bot/engelos/issues>
