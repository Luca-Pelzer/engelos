<!doctype html>
<!--
  engelOS overlay: wrapped (shareable recap card)
  ==============================================================
  Spotify-Wrapped-style recap card. Unlike the OBS overlays this page has a
  SOLID gradient background because it is meant to be screenshotted and
  shared, not composited over a stream.

  Data source (same-origin REST):
    GET /api/v1/wrapped?channel=<ch>[&viewer=<id>][&period=all|YYYY-MM]
      viewer card -> {kind:"viewer", username, messages, subs, sub_gifts,
                      rank, percentile, points, longest_streak}
      channel card -> {kind:"channel", total_messages, total_subs,
                       total_raids, total_viewers, top_chatters:[{username,messages}]}

  Query parameters:
    - channel : REQUIRED
    - viewer  : optional; omitted = channel card
    - period  : "all" (default) | "YYYY-MM"
    - accent  : 6-hex without # (default a970ff)

  Example: /overlay/wrapped?channel=engelswtf&viewer=12345&period=2026-05
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>engelOS / wrapped</title>
<style>
  :root{
    --accent:#a970ff;
    --bg1:#1a1030; --bg2:#0d0a1a;
    font-family:"Inter","Segoe UI",system-ui,-apple-system,Roboto,sans-serif;
  }
  html,body{margin:0;padding:0;width:100%;height:100%}
  body{
    background:radial-gradient(120% 120% at 70% 10%, var(--accent) 0%, var(--bg1) 38%, var(--bg2) 100%);
    color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;
  }
  .card{
    width:440px;max-width:92vw;padding:38px 40px 34px;border-radius:26px;
    background:rgba(12,10,22,.46);border:1px solid rgba(255,255,255,.14);
    box-shadow:0 24px 70px rgba(0,0,0,.5);backdrop-filter:blur(8px);
  }
  .brand{font-size:13px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);opacity:.95}
  .title{font-size:30px;font-weight:800;margin:6px 0 2px;letter-spacing:.01em}
  .sub{font-size:14px;color:rgba(255,255,255,.66);margin-bottom:24px}
  .hero{font-size:64px;font-weight:900;line-height:1;letter-spacing:-.02em;margin:0}
  .hero small{display:block;font-size:15px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.04em;margin-top:8px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:26px}
  .stat{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 16px}
  .stat .n{font-size:26px;font-weight:800}
  .stat .l{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-top:2px}
  .badge{display:inline-block;margin-top:22px;padding:7px 14px;border-radius:999px;background:var(--accent);color:#16021f;font-weight:800;font-size:14px}
  .list{margin:18px 0 0;padding:0;list-style:none}
  .list li{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:16px}
  .list li:last-child{border-bottom:0}
  .list .rk{color:var(--accent);font-weight:800;margin-right:10px}
  .list .nm{flex:1 1 auto;font-weight:600}
  .list .ms{color:rgba(255,255,255,.7);font-variant-numeric:tabular-nums}
  .foot{margin-top:26px;font-size:12px;color:rgba(255,255,255,.45);letter-spacing:.04em}
  #msg{font-size:15px;color:rgba(255,255,255,.7)}
</style>
</head>
<body>
<div class="card" id="card"><div id="msg">Loading your Wrapped&hellip;</div></div>
<script>
(() => {
  const params = new URLSearchParams(location.search);
  const channel = (params.get("channel") || "").trim();
  const viewer = (params.get("viewer") || "").trim();
  const period = (params.get("period") || "all").trim();
  const accent = (params.get("accent") || "").replace(/[^0-9a-fA-F]/g, "").slice(0, 6);
  if (accent.length === 6) document.documentElement.style.setProperty("--accent", "#" + accent);

  const card = document.getElementById("card");

  function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
  function n(x){return Number(x||0).toLocaleString("en-US");}
  function periodLabel(p){return p==="all"?"All-time":p;}

  function renderViewer(d){
    const pct = d.percentile > 0 ? `<div class="badge">Top ${esc(d.percentile)}% chatter</div>` : "";
    const rank = d.rank > 0 ? `#${esc(d.rank)}` : "&mdash;";
    card.innerHTML =
      '<div class="brand">engelOS Wrapped</div>' +
      '<div class="title">' + esc(d.username || "Viewer") + '</div>' +
      '<div class="sub">' + esc(d.channel) + ' &middot; ' + esc(periodLabel(d.period)) + '</div>' +
      '<p class="hero">' + n(d.messages) + '<small>MESSAGES SENT</small></p>' +
      '<div class="grid">' +
        '<div class="stat"><div class="n">' + rank + '</div><div class="l">Chatter rank</div></div>' +
        '<div class="stat"><div class="n">' + n(d.points) + '</div><div class="l">Points</div></div>' +
        '<div class="stat"><div class="n">' + n(d.longest_streak) + '</div><div class="l">Longest streak</div></div>' +
        '<div class="stat"><div class="n">' + n(d.subs) + '</div><div class="l">Subs</div></div>' +
      '</div>' + pct +
      '<div class="foot">Get your own at engels.wtf</div>';
  }

  function renderChannel(d){
    const top = (d.top_chatters || []).map((c,i) =>
      '<li><span><span class="rk">#' + (i+1) + '</span><span class="nm">' + esc(c.username) + '</span></span>' +
      '<span class="ms">' + n(c.messages) + '</span></li>').join("");
    card.innerHTML =
      '<div class="brand">engelOS Wrapped</div>' +
      '<div class="title">' + esc(d.channel) + '</div>' +
      '<div class="sub">' + esc(periodLabel(d.period)) + ' recap</div>' +
      '<p class="hero">' + n(d.total_messages) + '<small>MESSAGES IN CHAT</small></p>' +
      '<div class="grid">' +
        '<div class="stat"><div class="n">' + n(d.total_viewers) + '</div><div class="l">Chatters</div></div>' +
        '<div class="stat"><div class="n">' + n(d.total_subs) + '</div><div class="l">Subs</div></div>' +
        '<div class="stat"><div class="n">' + n(d.total_raids) + '</div><div class="l">Raids</div></div>' +
        '<div class="stat"><div class="n">' + (d.top_chatters ? d.top_chatters.length : 0) + '</div><div class="l">Top chatters</div></div>' +
      '</div>' +
      (top ? '<ul class="list">' + top + '</ul>' : '') +
      '<div class="foot">Powered by engelOS &middot; engels.wtf</div>';
  }

  function fail(text){ card.innerHTML = '<div class="brand">engelOS Wrapped</div><div class="title">No data yet</div><p id="msg">' + esc(text) + '</p>'; }

  if (!channel){ fail("Add ?channel= to the URL."); return; }
  const url = "/api/v1/wrapped?channel=" + encodeURIComponent(channel) +
    (viewer ? "&viewer=" + encodeURIComponent(viewer) : "") +
    "&period=" + encodeURIComponent(period);

  fetch(url, { headers: { "accept": "application/json" } })
    .then(res => {
      if (res.status === 404) { fail("No Wrapped data for this " + (viewer ? "viewer" : "channel") + " yet."); return null; }
      if (!res.ok) { fail("Couldn't load Wrapped right now."); return null; }
      return res.json();
    })
    .then(d => {
      if (!d) return;
      if (d.kind === "viewer") renderViewer(d); else renderChannel(d);
    })
    .catch(() => fail("Couldn't load Wrapped right now."));
})();
</script>
</body>
</html>
