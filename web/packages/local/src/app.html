<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#08090c" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('engelos_theme');
          if (t !== 'light' && t !== 'dark') t = 'dark';
          document.documentElement.setAttribute('data-theme', t);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', t === 'light' ? '#f6f8fb' : '#08090c');
          var a = JSON.parse(localStorage.getItem('engelos-accent') || '["#ff5d73","#ff9e3d"]');
          document.documentElement.style.setProperty('--brand', a[0]);
          document.documentElement.style.setProperty('--brand-2', a[1]);
        } catch (e) {}
      })();
    </script>
    <title>engelOS</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/JetBrains/JetBrainsMono@2.304/web/css/jetbrains-mono.css" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-[var(--color-bg)] text-[var(--color-fg)] antialiased">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
